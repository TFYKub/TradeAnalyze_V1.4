name: TradeAnalyze Daily Run

on:
  schedule:
    - cron: "0 0 * * *"   # 07:00 Bangkok
  workflow_dispatch:

jobs:
  run-bot:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      LINE_TOKEN: ${{ secrets.LINE_TOKEN }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Check Secrets
        run: |
          test -n "$SHEET_ID"
          test -n "$GOOGLE_CREDENTIALS"
          test -n "$LINE_TOKEN"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug
        run: |
          echo "===== START ====="
          date -u
          python --version
          pip --version

      - name: Run TradeAnalyze
        run: |
          python main.py | tee trade.log

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: trade.log
